  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

}\n  @keyframes cxDetailIn {\n    from { opacity: 0; transform: perspective(1400px) rotateY(-14deg) scale(0.96); }\n    to { opacity: 1; transform: perspective(1400px) rotateY(0deg) scale(1); }\n  }\n  @keyframes cxLogoSpin {\n    from { transform: rotate(0deg); }\n    to { transform: rotate(360deg); }\n  }\n  .cx-header { animation: cxHeaderIn .5s ease both; }\n  .cx-logo-ball { animation: cxLogoPop .6s cubic-bezier(.34,1.56,.64,1) both; transform-origin: 50% 50%; }\n  .cx-logo-spin { animation: cxLogoSpin .6s ease !important; transform-origin: 50% 50%; }\n  .cx-detail-enter { animation: cxDetailIn .45s cubic-bezier(.22,.9,.36,1) both; }\n  .cx-flame-divider {\n    height: 16px;\n    background: linear-gradient(180deg, #FF6B35, #D2401F);\n    clip-path: polygon(0 0,100% 0,100% 35%,95% 100%,90% 35%,85% 100%,80% 35%,75% 100%,70% 35%,65% 100%,60% 35%,55% 100%,50% 35%,45% 100%,40% 35%,35% 100%,30% 35%,25% 100%,20% 35%,15% 100%,10% 35%,5% 100%,0 35%);\n  }\n\n  @media (max-width: 900px) {\n    .cx-header, .cx-filterbar, .cx-view-pad { padding-left: 24px !important; padding-right: 24px !important; }\n  }\n  @media (max-width: 700px) {\n    .cx-detail-grid { grid-template-columns: 1fr !important; }\n  }\n  @media (max-width: 600px) {\n    .cx-header { padding: 14px 16px !important; gap: 12px !important; }\n    .cx-filterbar { padding: 14px 16px !important; gap: 10px !important; }\n    .cx-view-pad { padding-left: 16px !important; padding-right: 16px !important; }\n    .cx-header-inner { gap: 8px !important; }\n    .cx-logo-text { font-size: 19px !important; }\n    .cx-mascot-img { width: 24px !important; height: 24px !important; }\n    .cx-nav-wrap { gap: 4px !important; }\n    .cx-nav-item { padding: 6px 10px !important; font-size: 9.5px !important; }\n    .cx-detail-title { font-size: 24px !important; }\n    .cx-detail-card { padding: 16px !important; gap: 20px !important; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#F5E6C8;font-family:'Work Sans',sans-serif;color:#1A1A1A;position:relative;\">\n\n  <svg sc-camel-view-box=\"0 0 1000 600\" sc-camel-preserve-aspect-ratio=\"xMidYMid slice\" style=\"position:fixed;inset:0;width:100%;height:100%;opacity:0.055;pointer-events:none;z-index:0;\">\n    <rect x=\"10\" y=\"10\" width=\"980\" height=\"580\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"4\"><\u002Frect>\n    <line x1=\"500\" y1=\"10\" x2=\"500\" y2=\"590\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Fline>\n    <rect x=\"10\" y=\"220\" width=\"190\" height=\"160\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Frect>\n    <circle cx=\"200\" cy=\"300\" r=\"60\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Fcircle>\n    <rect x=\"800\" y=\"220\" width=\"190\" height=\"160\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Frect>\n    <circle cx=\"800\" cy=\"300\" r=\"60\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Fcircle>\n    <path d=\"M10,60 Q260,300 10,540\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Fpath>\n    <path d=\"M990,60 Q740,300 990,540\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Fpath>\n    <circle cx=\"500\" cy=\"300\" r=\"70\" fill=\"#F5E6C8\" stroke=\"#1A1A1A\" stroke-width=\"5\"><\u002Fcircle>\n    <path d=\"M430,300 A70,70 0 0 1 570,300 Z\" fill=\"#1A1A1A\"><\u002Fpath>\n    <path d=\"M440,272 Q500,232 560,272\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fpath>\n    <path d=\"M440,328 Q500,368 560,328\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fpath>\n    <circle cx=\"500\" cy=\"300\" r=\"16\" fill=\"#F5E6C8\" stroke=\"#1A1A1A\" stroke-width=\"5\"><\u002Fcircle>\n  <\u002Fsvg>\n\n  <div style=\"position:relative;z-index:1;\">\n\n  <!-- HEADER -->\n  <div class=\"cx-header\" style=\"display:flex;align-items:center;justify-content:space-between;gap:24px;padding:18px 40px;background:#1A1A1A;flex-wrap:wrap;\" data-screen-label=\"header\">\n    <div class=\"cx-header-inner\" sc-camel-on-click=\"{{ goCatalog }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:12px;\">\n      <svg class=\"{{ logoClass }}\" sc-camel-view-box=\"0 0 100 100\" width=\"38\" height=\"38\">\n        <circle cx=\"50\" cy=\"50\" r=\"46\" fill=\"#F5E6C8\" stroke=\"#F5E6C8\" stroke-width=\"5\"><\u002Fcircle>\n        <path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"#E67E22\"><\u002Fpath>\n        <path d=\"M8,44 Q50,18 92,44\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fpath>\n        <path d=\"M8,56 Q50,82 92,56\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fpath>\n        <circle cx=\"50\" cy=\"50\" r=\"10\" fill=\"#F5E6C8\" stroke=\"#1A1A1A\" stroke-width=\"4\"><\u002Fcircle>\n        <circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#1A1A1A\"><\u002Fcircle>\n      <\u002Fsvg>\n      <div class=\"cx-logo-text\" style=\"font-family:'Bungee',cursive;font-size:26px;letter-spacing:1px;color:#F5E6C8;\">CHIMIDEX<\u002Fdiv>\n      <img class=\"cx-mascot-img\" src=\"574a1e1c-e3a8-4119-a665-2c74bce968c9\" alt=\"Charizard\" loading=\"lazy\" style=\"width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));\">\n    <\u002Fdiv>\n    <div class=\"cx-nav-wrap\" style=\"display:flex;align-items:center;gap:6px;flex-wrap:wrap;\">\n      <sc-for list=\"{{ navItems }}\" as=\"nav\" hint-placeholder-count=\"6\">\n        <div class=\"cx-nav-item\" sc-camel-on-click=\"{{ nav.onClick }}\" style=\"cursor:pointer;padding:9px 18px;border-radius:999px;background:{{ nav.bg }};color:{{ nav.color }};font-family:'Rubik Mono One',monospace;font-size:11px;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;border:{{ nav.border }};\">\n          {{ nav.label }}\n          <sc-if value=\"{{ nav.showBadge }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"background:#E8B923;color:#1A1A1A;border-radius:999px;padding:1px 7px;font-size:10px;\">{{ teamCount }}/6<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"cx-flame-divider\"><\u002Fdiv>\n\n  <!-- CATALOG VIEW -->\n  <sc-if value=\"{{ isCatalog }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"catalogo\">\n      <div class=\"cx-filterbar\" style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:18px 40px;background:#EFDDB6;border-bottom:3px solid #1A1A1A;\">\n        <div sc-camel-on-click=\"{{ onToggleFilters }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;border:2px solid #1A1A1A;background:{{ filterBtnBg }};color:{{ filterBtnColor }};\">\n          <svg sc-camel-view-box=\"0 0 20 20\" width=\"14\" height=\"14\"><path d=\"M2,4 H18 M5,10 H15 M8,16 H12\" stroke=\"{{ filterBtnColor }}\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <div style=\"font-family:'Rubik Mono One',monospace;font-size:11px;text-transform:uppercase;\">Filtros<\u002Fdiv>\n          <sc-if value=\"{{ hasActiveFilters }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"background:#FF6B35;color:#1A1A1A;border-radius:999px;padding:1px 7px;font-size:10px;font-family:'Rubik Mono One',monospace;\">{{ activeFilterCount }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <input value=\"{{ searchQuery }}\" sc-camel-on-change=\"{{ onSearchChange }}\" placeholder=\"Buscar por nombre…\" style=\"padding:9px 14px;border-radius:10px;border:2px solid #1A1A1A;background:#F5E6C8;color:#1A1A1A;font-size:13px;min-width:170px;\">\n        <div style=\"margin-left:auto;font-family:'Rubik Mono One',monospace;font-size:12px;color:#1A1A1A;opacity:.6;\">{{ resultCount }} POKÉMON<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ filtersOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"d    <circle cx=\"50\" cy=\"50\" r=\"10\" fill=\"#F5E6C8\" stroke=\"#1A1A1A\" stroke-width=\"4\"><\u002Fcircle>\n            <circle cx=\"50\" cy=\"50\" r=\"4\" fill=\"#1A1A1A\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div style=\"font-family:'Bungee',cursive;font-size:24px;letter-spacing:1px;\">CHIMIDEX<\u002Fdiv>\n          <div style=\"font-family:'Rubik Mono One',monospace;font-size:11px;opacity:.5;text-transform:uppercase;\">Acceso de entrenador<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <label style=\"display:flex;flex-direction:column;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;opacity:.6;\">Email\n            <input value=\"{{ loginForm.email }}\" sc-camel-on-change=\"{{ loginForm.onEmailChange }}\" placeholder=\"entrenador@chimidex.gg\" style=\"padding:12px 14px;border-radius:10px;border:2px solid #1A1A1A;background:#fff;font-size:14px;\">\n          <\u002Flabel>\n          <label style=\"display:flex;flex-direction:column;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;opacity:.6;\">Contraseña\n            <input type=\"password\" value=\"{{ loginForm.password }}\" sc-camel-on-change=\"{{ loginForm.onPasswordChange }}\" placeholder=\"••••••••\" style=\"padding:12px 14px;border-radius:10px;border:2px solid #1A1A1A;background:#fff;font-size:14px;\">\n          <\u002Flabel>\n          <div sc-camel-on-click=\"{{ onLoginSubmit }}\" style=\"cursor:pointer;margin-top:8px;padding:13px;border-radius:10px;background:#FF6B35;color:#1A1A1A;text-align:center;font-family:'Rubik Mono One',monospace;font-size:13px;text-transform:uppercase;\">Entrar<\u002Fdiv>\n          <div style=\"text-align:center;font-size:12.5px;opacity:.6;margin-top:6px;\">¿No tienes cuenta? <span style=\"color:#D2401F;font-weight:700;\">Regístrate<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center;font-size:11px;opacity:.45;margin-top:10px;\">Demo: cualquier email/clave te da acceso de administrador.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DETAIL VIEW -->\n  <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"cx-view-pad\" data-screen-label=\"detalle\" style=\"padding:36px 40px 80px;display:flex;justify-content:center;\">\n      <div style=\"width:100%;max-width:920px;\">\n        <div sc-camel-on-click=\"{{ onBack }}\" style=\"cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:'Rubik Mono One',monospace;font-size:12px;text-transform:uppercase;margin-bottom:20px;opacity:.7;\">← Catálogo<\u002Fdiv>\n\n        <div class=\"cx-detail-grid cx-detail-card cx-detail-enter\" style=\"background:#F5E6C8;border:8px solid {{ selected.primaryColor }};border-radius:26px;padding:28px;box-shadow:0 10px 0 rgba(0,0,0,.15),0 20px 40px rgba(0,0,0,.16);display:grid;grid-template-columns:340px 1fr;gap:32px;perspective:1400px;\">\n\n          <div>\n            <div style=\"position:relative;height:320px;border-radius:16px;overflow:hidden;background-image:repeating-linear-gradient(90deg,#20304f,#20304f 16px,#1B2A4A 16px,#1B2A4A 32px);\">\n              <div style=\"position:absolute;top:12px;left:12px;background:#1A1A1A;color:#F5E6C8;font-family:'Rubik Mono One',monospace;font-size:12px;padding:5px 10px;border-radius:8px;z-index:2;\">{{ selected.numStr }}<\u002Fdiv>\n              <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;\">\n                <img src=\"{{ selected.imgSrc }}\" sc-camel-on-load=\"{{ onDetailImgLoad }}\" sc-camel-on-error=\"{{ onDetailImgError }}\" loading=\"lazy\" style=\"width:78%;height:78%;object-fit:contain;filter:drop-shadow(0 8px 14px rgba(0,0,0,.4));opacity:{{ detailImgOpacity }};transition:opacity .3s;\">\n              <\u002Fdiv>\n              <sc-if value=\"{{ detailImgError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;\">\n                  <div style=\"width:50%;aspect-ratio:1;background:{{ selected.primaryColor }};opacity:.4;border-radius:58% 42% 60% 40% / 55% 45% 55% 45%;\"><\u002Fdiv>\n                  <div style=\"font-family:ui-monospace,monospace;font-size:9px;color:#F5E6C8;opacity:.5;letter-spacing:.5px;\">IMAGEN NO DISPONIBLE<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;margin-top:14px;\">\n              <sc-for list=\"{{ selected.typesList }}\" as=\"t\" hint-placeholder-count=\"2\">\n                <div style=\"padding:4px 14px;border-radius:999px;background:{{ t.color }};color:#F5E6C8;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;\">{{ t.name }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;justify-content:space-between;margin-top:14px;font-size:12px;opacity:.6;\">\n              <div>{{ selected.region }}<\u002Fdiv>\n              <div>{{ selected.gen }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div>\n            <div class=\"cx-detail-title\" style=\"font-family:'Bungee',cursive;font-size:32px;text-transform:uppercase;margin-bottom:12px;\">{{ selected.name }}<\u002Fdiv>\n            <div style=\"font-family:'Work Sans',sans-serif;font-size:14.5px;line-height:1.55;opacity:.8;margin-bottom:20px;max-width:52ch;\">{{ selected.desc }}<\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:22px;\">\n              <sc-for list=\"{{ selected.statBars }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div style=\"display:grid;grid-template-columns:56px 1fr 40px;align-items:center;gap:10px;\">\n                  <div style=\"font-family:'Rubik Mono One',monospace;font-size:11px;opacity:.65;\">{{ s.label }}<\u002Fdiv>\n                  <div style=\"height:12px;border-radius:999px;background:rgba(26,26,26,.1);overflow:hidden;\">\n                    <div style=\"height:100%;width:{{ s.pct }}%;background:{{ selected.primaryColor }};border-radius:999px;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-family:'Rubik Mono One',monospace;font-size:12px;text-align:right;\">{{ s.value }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"font-family:'Rubik Mono One',monospace;font-size:12px;letter-spacing:.5px;opacity:.5;margin-bottom:8px;\">ATAQUES<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:6px;margin-bottom:24px;\">\n              <sc-for list=\"{{ selected.attacks }}\" as=\"atk\" hint-placeholder-count=\"2\">\n                <div style=\"display:flex;justify-content:space-between;padding:9px 14px;background:#EFDDB6;border-radius:10px;\">\n                  <div style=\"font-family:'Work Sans',sans-serif;font-weight:600;font-size:13.5px;\">{{ atk.name }}<\u002Fdiv>\n                  <div style=\"font-family:'Rubik Mono One',monospace;font-size:13px;color:{{ selected.primaryColor }};\">{{ atk.dmg }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n              <div sc-camel-on-click=\"{{ selected.onToggleFav }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:10px;padding:10px 20px 10px 14px;border-radius:999px;border:2px solid #1A1A1A;background:{{ selected.favBtnBg }};\">\n                <svg sc-camel-view-box=\"0 0 100 100\" width=\"26\" height=\"26\">\n                  <circle cx=\"50\" cy=\"50\" r=\"45\" fill=\"#F5E6C8\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Fcircle>\n                  <path d=\"M4,50 A46,46 0 0 1 96,50 Z\" fill=\"{{ selected.favFillTop }}\"><\u002Fpath>\n                  <path d=\"M10,42 Q50,22 90,42\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpath>\n                  <path d=\"M10,58 Q50,78 90,58\" fill=\"none\" stroke=\"#1A1A1A\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpath>\n                  <circle cx=\"50\" cy=\"50\" r=\"9\" fill=\"#F5E6C8\" stroke=\"#1A1A1A\" stroke-width=\"3\"><\u002Fcircle>\n                <\u002Fsvg>\n                <div style=\"font-family:'Rubik Mono One',monospace;font-size:12px;text-transform:uppercase;color:{{ selected.favTextColor }};\">{{ selected.favLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n\n              <div sc-camel-on-click=\"{{ selected.onToggleTeam }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:10px;padding:10px 20px;border-radius:999px;border:2px solid #1A1A1A;background:{{ selected.teamBtnBg }};\">\n                <div style=\"font-family:'Rubik Mono One',monospace;font-size:12px;text-transform:uppercase;color:{{ selected.teamTextColor }};\">{{ selected.teamLabel }}<\u002Fdiv>\n                <div style=\"font-family:'Rubik Mono One',monospace;font-size:10px;background:#E8B923;color:#1A1A1A;padding:2px 8px;border-radius:999px;\">{{ teamCount }}/6<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ hasEvolution }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-top:26px;\">\n                <div style=\"font-family:'Rubik Mono One',monospace;font-size:12px;letter-spacing:.5px;opacity:.5;margin-bottom:10px;\">LÍNEA EVOLUTIVA<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n                  <sc-for list=\"{{ evolutionNodes }}\" as=\"node\" hint-placeholder-count=\"3\">\n                    <sc-if value=\"{{ node.isArrow }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"font-family:'Rubik Mono One',monospace;font-size:16px;opacity:.4;\">→<\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ node.isStage }}\" hint-placeholder-val=\"{{ true }}\">\n                      <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n                        <sc-for list=\"{{ node.options }}\" as=\"mon\" hint-placeholder-count=\"2\">\n                          <div sc-camel-on-click=\"{{ mon.onSelect }}\" style=\"cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;width:86px;\">\n                            <dc-import name=\"PokeCard\" card=\"{{ mon }}\" remove-mode=\"{{ false }}\" show-fav=\"{{ false }}\" show-team=\"{{ false }}\" show-footer=\"{{ false }}\" style=\"display:block;width:86px;height:120px;border-radius:10px;overflow:hidden;border:{{ mon.evoBorder }};box-shadow:0 4px 10px rgba(0,0,0,.25);\" hint-size=\"86px,120px\"><\u002Fdc-import>\n                            <div style=\"font-size:10.5px;font-family:'Rubik Mono One',monospace;text-align:center;line-height:1.15;color:{{ mon.evoLabelColor }};\">{{ mon.name }}<\u002Fdiv>\n                            <div style=\"font-size:9px;font-family:ui-monospace,monospace;opacity:.5;\">{{ mon.numStr }}<\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    pokemon: [],\n    typeColors: {},\n    view: 'catalog',\n    selectedNum: 6,\n    filterTypes: [],\n    filterRegion: 'all',\n    filterGen: 'all',\n    searchQuery: '',\n    catalogPage: 1,\n    filtersOpen: false,\n    favorites: [],\n    teams: [{ id: 'team-1', name: 'Equipo 1', members: [] }],\n    activeTeamId: 'team-1',\n    evolutionChains: [],\n    editingTeamId: null,\n    editingTeamName: '',\n    teamPickerOpenIndex: null,\n    teamPickerQuery: '',\n    compareA: null,\n    compareB: null,\n    statsAnim: 1,\n    navSpin: false,\n    views: {},\n    timesChosen: {},\n    adminFormOpen: false,\n    adminEditNum: null,\n    adminForm: { name: '', type: 'fire', region: '', gen: 1, hp: 50, atk: 50, def: 50, spd: 50, attackName: '', attackDmg: 20 },\n    loginForm: { email: '', password: '' },\n    loggedIn: false,\n    detailImgLoaded: false,\n    detailImgError: false\n  };\n\n  componentDidMount() {\n    const seedViews = { 6: 1240, 25: 1080, 149: 860, 373: 790, 445: 710, 257: 640, 130: 590, 248: 520, 94: 470, 143: 430, 155: 380, 196: 340, 282: 300, 158: 260, 5: 220, 448: 190, 4: 170, 7: 150, 1: 130 };\n    const seedChosen = { 6: 420, 149: 310, 445: 280, 373: 260, 257: 230, 25: 210, 248: 180, 130: 160, 282: 140, 94: 120, 143: 100, 448: 90, 155: 75, 5: 60, 196: 50, 158: 40, 4: 30, 7: 20, 1: 15 };\n    const loadData = () => {\n      if (window.CHIMIDEX_POKEMON) {\n        this.setState({ pokemon: window.CHIMIDEX_POKEMON, typeColors: window.CHIMIDEX_TYPE_COLORS, evolutionChains: window.CHIMIDEX_EVOLUTION_CHAINS || [], views: seedViews, timesChosen: seedChosen });\n      } else {\n        setTimeout(loadData, 30);\n      }\n    };\n    loadData();\n  }\n\n  setView(v) {\n    this.setState({ view: v, navSpin: true });\n    window.scrollTo(0, 0);\n    clearTimeout(this._spinTimer);\n    this._spinTimer = setTimeout(() => this.setState({ navSpin: false }), 650);\n    if (v === 'stats') this.runStatsAnim();\n  }\n\n  runStatsAnim() {\n    this.setState({ statsAnim: 0 });\n    clearInterval(this._statsAnimTimer);\n    let p = 0;\n    this._statsAnimTimer = setInterval(() => {\n      p += 0.08;\n      if (p >= 1) { p = 1; clearInterval(this._statsAnimTimer); }\n      this.setState({ statsAnim: p });\n    }, 35);\n  }\n  toggleType(t) {\n    this.setState((s) => {\n      const has = s.filterTypes.includes(t);\n      return { filterTypes: has ? s.filterTypes.filter((x) => x !== t) : [...s.filterTypes, t], catalogPage: 1 };\n    });\n  }\n  setRegion(e) { this.setState({ filterRegion: e.target.value, catalogPage: 1 }); }\n  setSearch(e) { this.setState({ searchQuery: e.target.value, catalogPage: 1 }); }\n  loadMoreCatalog() { this.setState((s) => ({ catalogPage: s.catalogPage + 1 })); }\n  toggleFiltersOpen() { this.setState((s) => ({ filtersOpen: !s.filtersOpen })); }\n  setGen(e) {\n    const v = e.target.value;\n    this.setState({ filterGen: v === 'all' ? 'all' : Number(v), catalogPage: 1 });\n  }\n\n  selectPokemon(num) {\n    this.setState((s) => ({ view: 'detail', selectedNum: num, views: { ...s.views, [num]: (s.views[num] || 0) + 1 }, detailImgLoaded: false, detailImgError: false, navSpin: true }));\n    window.scrollTo(0, 0);\n    clearTimeout(this._spinTimer);\n    this._spinTimer = setTimeout(() => this.setState({ navSpin: false }), 650);\n  }\n\n  handleDetailImgLoad() { this.setState({ detailImgLoaded: true }); }\n  handleDetailImgError() { this.setState({ detailImgError: true }); }\n  backToCatalog() {\n    this.setState({ view: 'catalog', navSpin: true });\n    clearTimeout(this._spinTimer);\n    this._spinTimer = setTimeout(() => this.setState({ navSpin: false }), 650);\n  }\n\n  toggleFavorite(num, e) {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState((s) => {\n      const has = s.favorites.includes(num);\n      return { favorites: has ? s.favorites.filter((x) => x !== num) : [...s.favorites, num] };\n    });\n  }\n\n  toggleTeam(num, e) {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState((s) => {\n      let added = false;\n      const teams = s.teams.map((t) => {\n        if (t.id !== s.activeTeamId) return t;\n        const has = t.members.includes(num);\n        if (has) return { ...t, members: t.members.filter((x) => x !== num) };\n        if (t.members.length >= 6) return t;\n        added = true;\n        return { ...t, members: [...t.members, num] };\n      });\n      return {\n        teams,\n        timesChosen: added ? { ...s.timesChosen, [num]: (s.timesChosen[num] || 0) + 1 } : s.timesChosen\n      };\n    });\n  }\n\n  removeFromTeam(num, e) {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState((s) => ({\n      teams: s.teams.map((t) => (t.id === s.activeTeamId ? { ...t, members: t.members.filter((x) => x !== num) } : t))\n    }));\n  }\n\n  createTeam() {\n    this.setState((s) => {\n      const newId = 'team-' + Date.now();\n      const newTeam = { id: newId, name: 'Equipo ' + (s.teams.length + 1), members: [] };\n      return { teams: [...s.teams, newTeam], activeTeamId: newId };\n    });\n  }\n\n  setActiveTeam(id) { this.setState({ activeTeamId: id }); }\n\n  startEditTeamName(t) { this.setState({ editingTeamId: t.id, editingTeamName: t.name }); }\n  changeEditingTeamName(e) { this.setState({ editingTeamName: e.target.value }); }\n  saveTeamName() {\n    this.setState((s) => ({\n      teams: s.teams.map((t) => (t.id === s.editingTeamId ? { ...t, name: s.editingTeamName.trim() || t.name } : t)),\n      editingTeamId: null\n    }));\n  }\n  cancelEditTeamName() { this.setState({ editingTeamId: null }); }\n\n  deleteTeam(id) {\n    if (!window.confirm('¿Eliminar este equipo? Esta acción no se puede deshacer.')) return;\n    this.setState((s) => {\n      if (s.teams.length <= 1) return null;\n      const teams = s.teams.filter((t) => t.id !== id);\n      const activeTeamId = s.activeTeamId === id ? teams[0].id : s.activeTeamId;\n      return { teams, activeTeamId };\n    });\n  }\n\n  openTeamPicker(index) { this.setState({ teamPickerOpenIndex: index, teamPickerQuery: '' }); }\n  closeTeamPicker() { this.setState({ teamPickerOpenIndex: null }); }\n  setTeamPickerQuery(e) { this.setState({ teamPickerQuery: e.target.value }); }\n\n  assignToSlot(index, num) {\n    this.setState((s) => ({\n      teams: s.teams.map((t) => {\n        if (t.id !== s.activeTeamId) return t;\n        const members = [...t.members];\n        const already = members.indexOf(num);\n        if (already !== -1) members[already] = undefined;\n        while (members.length <= index) members.push(undefined);\n        members[index] = num;\n        return { ...t, members };\n      }),\n      timesChosen: { ...s.timesChosen, [num]: (s.timesChosen[num] || 0) + 1 },\n      teamPickerOpenIndex: null\n    }));\n  }\n\n  moveTeamMember(idx, dir) {\n    this.setState((s) => ({\n      teams: s.teams.map((t) => {\n        if (t.id !== s.activeTeamId) return t;\n        const members = [...t.members];\n        const j = idx + dir;\n        if (j < 0 || j >= members.length) return t;\n        const tmp = members[idx]; members[idx] = members[j]; members[j] = tmp;\n        return { ...t, members };\n      })\n    }));\n  }\n\n  setCompareA(e) { const v = e.target.value; this.setState({ compareA: v ? Number(v) : null }); this.runStatsAnim(); }\n  setCompareB(e) { const v = e.target.value; this.setState({ compareB: v ? Number(v) : null }); this.runStatsAnim(); }\n\n  fieldHandler(key, parse) {\n    return (e) => {\n      const raw = e.target.value;\n      this.setState((s) => ({ adminForm: { ...s.adminForm, [key]: parse ? parse(raw) : raw } }));\n    };\n  }\n\n  openCreate() {\n    const firstType = Object.keys(this.state.typeColors)[0] || 'fire';\n    this.setState({\n      adminFormOpen: true,\n      adminEditNum: null,\n      adminForm: { name: '', type: firstType, region: '', gen: 1, hp: 50, atk: 50, def: 50, spd: 50, attackName: '', attackDmg: 20 }\n    });\n  }\n\n  openEdit(p) {\n    this.setState({\n      adminFormOpen: true,\n      adminEditNum: p.num,\n      adminForm: {\n        name: p.name,\n        type: p.types[0],\n        region: p.region,\n        gen: p.gen,\n        hp: p.hp, atk: p.atk, def: p.def, spd: p.spd,\n        attackName: p.attacks && p.attacks[0] ? p.attacks[0].name : '',\n        attackDmg: p.attacks && p.attacks[0] ? p.attacks[0].dmg : 20\n      }\n    });\n  }\n\n  cancelAdminForm() { this.setState({ adminFormOpen: false }); }\n\n  setAdminType(t) { this.setState((s) => ({ adminForm: { ...s.adminForm, type: t } })); }\n\n  saveAdminForm() {\n    this.setState((s) => {\n      const f = s.adminForm;\n      const entry = {\n        num: s.adminEditNum != null ? s.adminEditNum : Math.max(0, ...s.pokemon.map((p) => p.num)) + 1,\n        name: f.name || 'Sin nombre',\n        types: [f.type],\n        hp: Number(f.hp) || 0,\n        atk: Number(f.atk) || 0,\n        def: Number(f.def) || 0,\n        spd: Number(f.spd) || 0,\n        region: f.region || '—',\n        gen: Number(f.gen) || 1,\n        attacks: [{ name: f.attackName || 'Ataque', dmg: Number(f.attackDmg) || 0 }],\n        desc: (s.pokemon.find((p) => p.num === s.adminEditNum) || {}).desc || 'Entrada de Pokédex pendiente de completar.'\n      };\n      const pokemon = s.adminEditNum != null\n        ? s.pokemon.map((p) => (p.num === s.adminEditNum ? entry : p))\n        : [...s.pokemon, entry];\n      return { pokemon, adminFormOpen: false };\n    });\n  }\n\n  deletePokemon(num) {\n    this.setState((s) => ({\n      pokemon: s.pokemon.filter((p) => p.num !== num),\n      favorites: s.favorites.filter((x) => x !== num),\n      teams: s.teams.map((t) => ({ ...t, members: t.members.filter((x) => x !== num) }))\n    }));\n  }\n\n  setLoginField(key) {\n    return (e) => {\n      const v = e.target.value;\n      this.setState((s) => ({ loginForm: { ...s.loginForm, [key]: v } }));\n    };\n  }\n\n  submitLogin() { this.setState({ loggedIn: true, view: 'catalog' }); window.scrollTo(0, 0); }\n  logout() { this.setState({ loggedIn: false, view: 'catalog' }); window.scrollTo(0, 0); }\n\n  buildCardData(p, typeColors, favorites, team) {\n    const primary = typeColors[p.types[0]] || '#9A9885';\n    const isFav = favorites.includes(p.num);\n    const inTeam = team.includes(p.num);\n    const maxStat = 150;\n    const pct = (v) => Math.round(Math.min(100, (v / maxStat) * 100));\n    const attacks = p.attacks || [];\n    return {\n      num: p.num,\n      numStr: 'N.º ' + String(p.num).padStart(3, '0'),\n      name: p.name,\n      desc: p.desc || '',\n      typesList: p.types.map((t) => ({ name: t, color: typeColors[t] })),\n      primaryColor: primary,\n      hp: p.hp,\n      region: p.region,\n      gen: 'Gen ' + p.gen,\n      attacks: attacks,\n      firstAttackName: attacks[0] ? attacks[0].name : '—',\n      firstAttackDmg: attacks[0] ? attacks[0].dmg : '',\n      imgSrc: 'https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/' + p.num + '.png',\n      statBars: [\n        { label: 'HP', value: p.hp, pct: pct(p.hp) },\n        { label: 'ATK', value: p.atk, pct: pct(p.atk) },\n        { label: 'DEF', value: p.def, pct: pct(p.def) },\n        { label: 'SPD', value: p.spd, pct: pct(p.spd) }\n      ],\n      isFav,\n      inTeam,\n      favFillTop: isFav ? '#E67E22' : '#F5E6C8',\n      heartFill: isFav ? '#D2401F' : 'rgba(245,230,200,.25)',\n      favBtnBg: isFav ? '#FBE3C6' : '#F5E6C8',\n      favTextColor: isFav ? '#D2401F' : '#1A1A1A',\n      favLabel: isFav ? 'En favoritos' : 'Favorito',\n      teamBtnBg: inTeam ? '#1B2A4A' : '#F5E6C8',\n      teamTextColor: inTeam ? '#F5E6C8' : '#1A1A1A',\n      teamLabel: inTeam ? 'En el equipo ✓' : 'Agregar al equipo',\n      teamChipBg: inTeam ? '#1B2A4A' : '#F5E6C8',\n      teamChipColor: inTeam ? '#F5E6C8' : '#1A1A1A',\n      teamChipIcon: inTeam ? '✓' : '+',\n      onSelect: () => this.selectPokemon(p.num),\n      onToggleFav: (e) => this.toggleFavorite(p.num, e),\n      onToggleTeam: (e) => this.toggleTeam(p.num, e)\n    };\n  }\n\n  renderVals() {\n    const { pokemon, typeColors, filterTypes, filterRegion, filterGen, searchQuery, catalogPage, filtersOpen, favorites, teams, activeTeamId, view, selectedNum, views, timesChosen, adminFormOpen, adminEditNum, adminForm, loginForm, loggedIn } = this.state;\n\n    const activeTeam = teams.find((t) => t.id === activeTeamId) || teams[0] || { id: null, name: '', members: [] };\n    const team = activeTeam.members;\n\n    const regions = [...new Set(pokemon.map((p) => p.region))];\n    const gens = [...new Set(pokemon.map((p) => p.gen))].sort((a, b) => a - b);\n    const allTypes = Object.keys(typeColors);\n\n    const q = (searchQuery || '').trim().toLowerCase();\n    const filtered = pokemon.filter((p) => {\n      if (filterTypes.length && !p.types.some((t) => filterTypes.includes(t))) return false;\n      if (filterRegion !== 'all' && p.region !== filterRegion) return false;\n      if (filterGen !== 'all' && p.gen !== filterGen) return false;\n      if (q && !p.name.toLowerCase().includes(q)) return false;\n      return true;\n    });\n\n    const pageSize = 24;\n    const visibleCount = pageSize * catalogPage;\n    const pagedFiltered = filtered.slice(0, visibleCount);\n    const cards = pagedFiltered.map((p) => this.buildCardData(p, typeColors, favorites, team));\n    const hasMore = filtered.length > visibleCount;\n    const favCards = pokemon.filter((p) => favorites.includes(p.num)).map((p) => this.buildCardData(p, typeColors, favorites, team));\n\n    const selectedRaw = pokemon.find((p) => p.num === selectedNum);\n    const selected = selectedRaw ? this.buildCardData(selectedRaw, typeColors, favorites, team) : null;\n\n    const chains = this.state.evolutionChains || [];\n    const matchedChain = selected ? chains.find((c) => c.stages.some((stage) => stage.includes(selected.name))) : null;\n    const evolutionNodes = [];\n    if (matchedChain) {\n      matchedChain.stages.forEach((stageNames, i) => {\n        if (i > 0) evolutionNodes.push({ isArrow: true, isStage: false });\n        const options = stageNames.map((n) => {\n          const p = pokemon.find((pp) => pp.name === n);\n          if (!p) return null;\n          const card = this.buildCardData(p, typeColors, favorites, team);\n          ca
